name: Android APK Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  actions: write
  contents: write

concurrency:
  group: gridking-android-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build GridKing APK and publish release
    runs-on: ubuntu-latest
    env:
      GRIDKING_API_URL: ${{ vars.GRIDKING_API_URL || secrets.GRIDKING_API_URL }}
      GRIDKING_WS_URL: ${{ vars.GRIDKING_WS_URL || secrets.GRIDKING_WS_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate production configuration
        shell: bash
        run: |
          if [[ -z "$GRIDKING_API_URL" ]]; then
            echo "::error::GRIDKING_API_URL is missing. Add it to the GridKing-Frontend repository under Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [[ -z "$GRIDKING_WS_URL" ]]; then
            echo "::error::GRIDKING_WS_URL is missing. Add it to the GridKing-Frontend repository under Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [[ "$GRIDKING_API_URL" != https://* ]]; then
            echo "::error::GRIDKING_API_URL must start with https://"
            exit 1
          fi
          if [[ "$GRIDKING_WS_URL" != wss://* ]]; then
            echo "::error::GRIDKING_WS_URL must start with wss://"
            exit 1
          fi

      - name: Generate GridKing assets
        run: npm run assets

      - name: Build production web app
        run: npm run build:production

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Prepare APK
        id: apk
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          tag="android-apk-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          apk_name="GridKing-${short_sha}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$apk_name"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Remove previous GridKing APK releases and artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '.[].tagName' |
          while read -r tag; do
            if [[ "$tag" == android-apk-* ]]; then
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
            fi
          done

          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts" --paginate \
            --jq '.artifacts[] | select(.name | startswith("GridKing-")) | .id' |
          while read -r artifact_id; do
            if [[ -n "$artifact_id" ]]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id"
            fi
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ${{ steps.apk.outputs.apk_name }}
          retention-days: 7

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk.outputs.tag }}
          name: GridKing Android APK ${{ github.run_number }}
          body: Latest installable GridKing Android debug APK built from master.
          target_commitish: ${{ github.sha }}
          make_latest: true
          files: ${{ steps.apk.outputs.apk_name }}
